<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Stackly Marketplace</title>
    <link
      rel="icon"
      type="image/webp"
      href="../assets/images/logoStackly.webp"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body class="dash-body">
    <!-- Sidebar Overlay (mobile) -->
    <div class="dash-overlay" id="dashOverlay"></div>

    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dashSidebar">
      <div class="dash-sidebar-header">
        <!-- <a href="../index.html" class="dash-brand">
          <img
            src="../assets/images/logoStackly.webp"
            alt="Stackly"
            class="dash-brand-logo"
          />
        </a> -->
        <div>
          <a
            href="../index.html"
            class="logo-link d-flex align-items-center text-decoration-none"
          >
            <img
              src="../assets/images/logoStackly.webp"
              alt="Stackly Logo"
              class="logo-img"
              style="height: 30px"
            />
          </a>
        </div>
        <button class="dash-sidebar-close d-lg-none" id="sidebarClose">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Role Badge -->
      <div class="dash-role-badge" id="sidebarRoleBadge"></div>

      <!-- Navigation -->
      <nav class="dash-nav" id="dashNav"></nav>

      <div class="dash-sidebar-footer">
        <a href="login.html" class="dash-logout-btn" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Sign Out</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="dash-main" id="dashMain">
      <!-- Top Bar -->
      <header class="dash-topbar">
        <div class="dash-topbar-left">
          <button class="dash-menu-toggle d-lg-none" id="menuToggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="dash-breadcrumb">
            <span id="dashPageTitle">Dashboard</span>
          </div>
        </div>
        <div class="dash-topbar-right">
          <div class="dash-topbar-search d-none d-md-flex">
            <i class="fa-solid fa-magnifying-glass"></i>
            <label class="visually-hidden" for="dashboard-search-input"
              >Search</label
            >
            <input
              type="text"
              placeholder="Search..."
              id="dashboard-search-input"
              name="search"
            />
          </div>
          <button class="dash-icon-btn position-relative">
            <i class="fa-regular fa-bell"></i>
            <span class="dash-notif-dot"></span>
          </button>
          <div class="dash-user-chip" id="dashUserChip">
            <div class="dash-user-avatar" id="dashUserAvatar"></div>
            <div class="dash-user-info d-none d-sm-block">
              <div class="dash-user-name" id="dashUserName">Loading...</div>
              <div class="dash-user-role" id="dashUserRole">—</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <main class="dash-content" id="dashContent">
        <!-- Injected by JS -->
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
